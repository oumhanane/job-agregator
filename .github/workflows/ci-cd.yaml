name: CI/CD Job Aggregator

on:
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  IMAGE_NAME: job-aggregator

jobs:

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image (for tests)
        run: docker compose build

      - name: Run tests inside container
        run: docker compose run --rm job-aggregator python -m pytest


  security_analysis:
    name: SAST + SCA
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # -------------------
      # Python setup + cache pip
      # -------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install security tools
        run: |
          pip install --upgrade pip
          pip install bandit pip-audit

      # -------------------
      # SAST (Bandit)
      # -------------------
      - name: Run Bandit (SAST)
        run: bandit -c bandit.yaml -r .

      # -------------------
      # SCA (pip dependencies)
      # -------------------
      - name: Run pip-audit (SCA)
        run: pip-audit -r requirements.txt


  security:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: security_analysis

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t $IMAGE_NAME:latest .

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:latest
          format: table
          exit-code: 1


  build_and_push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Define image version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          else
            echo "VERSION=latest" >> $GITHUB_ENV
          fi

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/job-aggregator:${VERSION} .

      - name: Tag latest (only on main)
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/job-aggregator:${VERSION} \
                     ${{ secrets.DOCKERHUB_USERNAME }}/job-aggregator:latest

      - name: Push versioned image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/job-aggregator:${VERSION}

      - name: Push latest (only main)
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/job-aggregator:latest